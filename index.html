<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI员工协作系统</title>
    <script>
      (() => {
        try {
          const mode = localStorage.getItem("theme-mode");
          const legacyTheme = localStorage.getItem("theme");
          const isThemeMode = mode === "light" || mode === "dark" || mode === "system";
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const effectiveMode = isThemeMode ? mode : legacyTheme === "light" || legacyTheme === "dark" ? legacyTheme : "system";
          const isDark = effectiveMode === "dark" || (effectiveMode === "system" && prefersDark);

          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch {
          document.documentElement.classList.remove("dark");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
